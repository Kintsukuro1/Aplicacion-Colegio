<script>
(function() {
    'use strict';

    // ─── Sidebar Hierarchical Tree Navigation ───
    var STORAGE_KEY = 'sidebar_tree_state';
    var SCROLL_KEY = 'portal_sidebar_scroll';

    function getSidebarNav() {
        return document.querySelector('.pers-sidebar__nav')
            || document.querySelector('.sidebar-nav.sidebar-nav--tree')
            || document.querySelector('.sidebar .sidebar-nav');
    }

    function saveSidebarScroll() {
        var nav = getSidebarNav();
        if (!nav) return;
        try {
            sessionStorage.setItem(SCROLL_KEY, String(nav.scrollTop));
        } catch (e) { /* ignore */ }
    }

    function restoreSidebarScroll() {
        var nav = getSidebarNav();
        if (!nav) return;
        try {
            var saved = sessionStorage.getItem(SCROLL_KEY);
            if (saved !== null && saved !== '') {
                nav.scrollTop = parseInt(saved, 10) || 0;
                return;
            }
        } catch (e) { /* ignore */ }
        var active = nav.querySelector('.nav-tree__item.active');
        if (active && active.scrollIntoView) {
            active.scrollIntoView({ block: 'nearest', inline: 'nearest' });
        }
    }

    function bindSidebarScrollPersistence() {
        var nav = getSidebarNav();
        if (!nav || nav.dataset.scrollPersistBound === 'true') return;
        nav.dataset.scrollPersistBound = 'true';

        var scrollTimer;
        nav.addEventListener('scroll', function() {
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(saveSidebarScroll, 120);
        }, { passive: true });

        nav.querySelectorAll('a[href]').forEach(function(link) {
            link.addEventListener('click', saveSidebarScroll);
        });

        window.addEventListener('beforeunload', saveSidebarScroll);
    }

    function loadState() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        } catch(e) { return {}; }
    }

    function saveState(state) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
    }

    function openGroup(group) {
        var btn = group.querySelector('.nav-tree__toggle');
        var children = group.querySelector('.nav-tree__children');
        if (!btn || !children) return;
        btn.setAttribute('aria-expanded', 'true');
        group.classList.add('nav-tree__group--open');
        children.style.maxHeight = 'none';
        children.style.overflow = 'visible';
    }

    function closeGroup(group) {
        var btn = group.querySelector('.nav-tree__toggle');
        var children = group.querySelector('.nav-tree__children');
        if (!btn || !children) return;
        btn.setAttribute('aria-expanded', 'false');
        group.classList.remove('nav-tree__group--open');
        children.style.maxHeight = '0px';
        children.style.overflow = 'hidden';
    }

    function toggleGroup(group) {
        var btn = group.querySelector('.nav-tree__toggle');
        var children = group.querySelector('.nav-tree__children');
        if (!btn || !children) return;

        var isCurrentlyOpen = btn.getAttribute('aria-expanded') === 'true';

        if (isCurrentlyOpen) {
            // Animate close
            children.style.overflow = 'hidden';
            children.style.maxHeight = children.scrollHeight + 'px';
            requestAnimationFrame(function() {
                children.style.maxHeight = '0px';
            });
            btn.setAttribute('aria-expanded', 'false');
            group.classList.remove('nav-tree__group--open');
        } else {
            // Animate open
            children.style.overflow = 'hidden';
            children.style.maxHeight = '0px';
            requestAnimationFrame(function() {
                children.style.maxHeight = children.scrollHeight + 'px';
            });
            btn.setAttribute('aria-expanded', 'true');
            group.classList.add('nav-tree__group--open');
            // After transition completes, allow natural height
            children.addEventListener('transitionend', function handler() {
                if (btn.getAttribute('aria-expanded') === 'true') {
                    children.style.maxHeight = 'none';
                    children.style.overflow = 'visible';
                }
                children.removeEventListener('transitionend', handler);
            });
        }

        // Persist state
        var state = loadState();
        state[group.dataset.group] = !isCurrentlyOpen;
        saveState(state);
    }

    function initSidebarTree() {
        var groups = document.querySelectorAll('.nav-tree__group');
        if (!groups.length) {
            bindSidebarScrollPersistence();
            restoreSidebarScroll();
            return;
        }

        var savedState = loadState();

        groups.forEach(function(group) {
            if (group.dataset.navTreeInitialized === "true") return;
            group.dataset.navTreeInitialized = "true";

            var btn = group.querySelector('.nav-tree__toggle');
            var key = group.dataset.group;

            // Auto-expand if has active child OR was previously open
            var hasActive = group.querySelector('.nav-tree__item.active') !== null;
            var shouldOpen = hasActive || savedState[key] === true;

            // On init: no animation, just set state directly
            if (shouldOpen) {
                openGroup(group);
            } else {
                closeGroup(group);
            }

            // Click handler with animation
            if (btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleGroup(group);
                });
            }
        });

        // Update badge counts
        groups.forEach(function(group) {
            var badge = group.querySelector('.nav-tree__toggle-badge');
            if (badge) {
                var count = group.querySelectorAll('.nav-tree__item').length;
                badge.setAttribute('data-count', count);
                badge.textContent = count;
            }
        });

        bindSidebarScrollPersistence();
        requestAnimationFrame(restoreSidebarScroll);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebarTree);
    } else {
        initSidebarTree();
    }
})();
</script>
